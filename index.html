<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif}button:hover{opacity:0.85}table{border-spacing:0}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;


const USD=44;
const fmt=n=>n.toLocaleString("uk-UA");
const fmtPct=n=>`${n.toFixed(1)}%`;

const DATA={
  VRN:{
    apr:{label:"Квітень",orders:52,revenue:234229,aov:4504,
      cats:[
        {name:"Содоструйки",orders:18,qty:21,revenue:129225,color:"#10b981"},
        {name:"Скалери",orders:2,qty:5,revenue:25480,color:"#3b82f6"},
        {name:"Наконечники",orders:7,qty:7,revenue:40977,color:"#8b5cf6"},
        {name:"Насадки",orders:19,qty:65,revenue:20427,color:"#ef4444"},
        {name:"Порошки",orders:5,qty:10,revenue:7120,color:"#f59e0b"},
        {name:"Лампи",orders:1,qty:1,revenue:11000,color:"#06b6d4"},
      ],
      camps:[
        {name:"Нак + Содо",spentUSD:1026.16,purchases:25,rev:170202},
        {name:"Скалери",spentUSD:95.46,purchases:2,rev:25480},
        {name:"Насадки",spentUSD:326.36,purchases:19,rev:20427},
        {name:"Порошки",spentUSD:146.54,purchases:5,rev:7120},
        {name:"Лампи",spentUSD:32.13,purchases:1,rev:11000},
      ],
      leads:null,traffic:null,cancelled:{orders:20,revenue:158130}},
    may:{label:"Травень",orders:56,revenue:337575,aov:6028,
      cats:[
        {name:"Содоструйки",orders:22,qty:30,revenue:206320,color:"#10b981"},
        {name:"Скалери",orders:2,qty:2,revenue:82225,color:"#3b82f6"},
        {name:"Наконечники",orders:3,qty:4,revenue:10040,color:"#8b5cf6"},
        {name:"Насадки",orders:20,qty:54,revenue:28940,color:"#ef4444"},
        {name:"Порошки",orders:9,qty:15,revenue:10050,color:"#f59e0b"},
        {name:"Лампи",orders:0,qty:0,revenue:0,color:"#06b6d4"},
      ],
      camps:[
        {name:"Нак + Содо",spentUSD:954.21,purchases:25,rev:216360},
        {name:"Скалери",spentUSD:568.09,purchases:2,rev:82225},
        {name:"Насадки",spentUSD:682.62,purchases:20,rev:28940},
        {name:"Порошки",spentUSD:494.96,purchases:9,rev:10050},
        {name:"Лампи",spentUSD:0,purchases:0,rev:0},
      ],
      leads:null,traffic:{spentUSD:31.09,reach:41230,clicks:653},cancelled:{orders:15,revenue:43070}},
    jun:{label:"Червень",orders:79,revenue:586800,aov:7428,
      cats:[
        {name:"Содоструйки",orders:32,qty:35,revenue:248200,color:"#10b981"},
        {name:"Скалери",orders:4,qty:4,revenue:251000,color:"#3b82f6"},
        {name:"Наконечники",orders:0,qty:0,revenue:0,color:"#8b5cf6"},
        {name:"Насадки",orders:33,qty:247,revenue:61700,color:"#ef4444"},
        {name:"Порошки",orders:8,qty:18,revenue:10700,color:"#f59e0b"},
        {name:"Лампи",orders:2,qty:2,revenue:15200,color:"#06b6d4"},
      ],
      camps:[
        {name:"Нак + Содо",spentUSD:747.43,purchases:32,rev:248200},
        {name:"Скалери",spentUSD:456.00,purchases:4,rev:251000},
        {name:"Насадки",spentUSD:895.67,purchases:33,rev:61700},
        {name:"Порошки",spentUSD:0,purchases:0,rev:0},
        {name:"Лампи",spentUSD:72.49,purchases:2,rev:15200},
      ],
      leads:{spentUSD:826.73,reach:65015,clicks:2087,results:38},
      traffic:{spentUSD:89.54,reach:80216,clicks:1983},cancelled:{orders:4,revenue:40200}},
  },
  YouJoy:{
    jun:{label:"Червень",orders:4,revenue:685900,aov:171475,
      cats:[
        {name:"Сканери",orders:3,qty:3,revenue:610000,color:"#8b5cf6"},
        {name:"Рентген",orders:1,qty:1,revenue:75900,color:"#f59e0b"},
      ],
      camps:[],
      leads:{spentUSD:557.63,reach:31267,clicks:503,results:20},
      traffic:null,cancelled:{orders:0,revenue:0}},
  },
  SOCO:{},
};

const mColors={apr:"#3b82f6",may:"#10b981",jun:"#f59e0b"};

function MonthBadge({label,color}){
  return <div style={{display:"inline-block",background:color+"15",color,border:`1px solid ${color}35`,borderRadius:6,padding:"3px 10px",fontSize:10,fontWeight:700,letterSpacing:"0.04em",textTransform:"uppercase"}}>{label}</div>;
}
function SectionLabel({children,icon}){
  return <div style={{fontSize:14,fontWeight:800,color:"#0f172a",margin:"28px 0 12px",paddingBottom:8,borderBottom:"2px solid #e2e8f0"}}>{icon} {children}</div>;
}
function Th({children,align,sticky,bg}){
  const s={padding:"9px 10px",textAlign:align||"left",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.04em",whiteSpace:"nowrap",background:bg||"transparent"};
  if(sticky)Object.assign(s,{position:"sticky",left:0,background:bg||"#fff",zIndex:2,borderRight:"2px solid #e2e8f0"});
  return <th style={s}>{children}</th>;
}
function Td({children,bold,color,align,bg,br}){
  return <td style={{padding:"9px 10px",fontWeight:bold?700:400,color:color||"#1e293b",textAlign:align||"left",fontSize:12,whiteSpace:"nowrap",background:bg||"transparent",borderRight:br?"3px solid #e2e8f0":"none"}}>{children}</td>;
}
function STd({children,bg}){
  return <td style={{padding:"9px 10px",fontWeight:700,fontSize:12,whiteSpace:"nowrap",position:"sticky",left:0,background:bg||"#fff",zIndex:1,borderRight:"2px solid #e2e8f0"}}>{children}</td>;
}
function RoasCell({val}){
  if(!val)return <Td align="center" color="#cbd5e1">—</Td>;
  const c=val>=5?"#059669":val>=2?"#d97706":"#ef4444";
  return <Td align="center" bold color={c}>{val.toFixed(1)}x</Td>;
}
function DrrCell({val,bg,br}){
  if(val===null||val===undefined)return <Td align="center" color="#cbd5e1" bg={bg} br={br}>—</Td>;
  const c=val<=20?"#059669":val<=40?"#d97706":"#ef4444";
  return <Td align="center" color={c} bg={bg} br={br}>{fmtPct(val)}</Td>;
}
function Dash({bg,br}){return <Td align="center" color="#cbd5e1" bg={bg} br={br}>—</Td>;}

function Dashboard(){
  const [project,setProject]=useState("VRN");
  const [tab,setTab]=useState("products");
  const pData=DATA[project];
  const months=Object.keys(pData);
  const hasData=months.length>0;
  const hasCamps=hasData&&months.some(m=>pData[m].camps&&pData[m].camps.length>0);

  const monthAdSpend={};
  if(hasData)months.forEach(m=>{
    const d=pData[m];let t=d.camps?d.camps.reduce((s,c)=>s+c.spentUSD,0):0;
    if(d.leads)t+=d.leads.spentUSD;if(d.traffic)t+=d.traffic.spentUSD;
    monthAdSpend[m]=Math.round(t*USD);
  });

  return(
    <div style={{fontFamily:"'Inter',sans-serif",background:"#fff",minHeight:"100vh",padding:"28px 20px",color:"#0f172a"}}>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <h1 style={{fontSize:22,fontWeight:900,margin:0,letterSpacing:"-0.03em"}}>Дашборд продажів</h1>
            <p style={{fontSize:12,color:"#94a3b8",margin:"4px 0 0"}}>Курс $1 = {USD} ₴ · Роздріб · Оплачені</p>
          </div>
          <div style={{display:"flex",gap:4}}>
            {["VRN","YouJoy","SOCO"].map(p=>(
              <button key={p} onClick={()=>{setProject(p);setTab("products")}} style={{
                padding:"8px 20px",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer",
                border:project===p?"none":"1px solid #e2e8f0",
                background:project===p?"#0f172a":"#fff",color:project===p?"#fff":"#94a3b8",
                fontFamily:"'Inter',sans-serif",transition:"all 0.2s",
              }}>{p}</button>
            ))}
          </div>
        </div>

        {!hasData&&<div style={{textAlign:"center",padding:80,color:"#94a3b8",fontSize:15,background:"#f8fafc",borderRadius:16}}>Даних по {project} ще немає.<br/>Скиньте продажі та кампанії — і я додам.</div>}

        {hasData&&<>
          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:`repeat(${months.length},1fr)`,gap:10,marginBottom:20}}>
            {months.map(m=>{const d=pData[m];const mc=mColors[m];return(
              <div key={m} style={{background:"#fff",border:`2px solid ${mc}30`,borderRadius:14,padding:"18px 16px",borderTop:`4px solid ${mc}`}}>
                <MonthBadge label={d.label} color={mc}/>
                <div style={{fontSize:28,fontWeight:900,letterSpacing:"-0.03em",marginTop:10}}>{fmt(d.revenue)} ₴</div>
                <div style={{display:"flex",gap:16,marginTop:8}}>
                  <div style={{fontSize:12,color:"#64748b"}}><strong style={{color:"#1e293b"}}>{d.orders}</strong> замовлень</div>
                  <div style={{fontSize:12,color:"#64748b"}}>AOV <strong style={{color:"#1e293b"}}>{fmt(d.aov)} ₴</strong></div>
                </div>
              </div>
            )})}
          </div>

          {/* TABS */}
          <div style={{display:"flex",gap:4,marginBottom:16}}>
            {[{id:"products",l:"📦 Товари + Витрати"},{id:"ads",l:"📊 Реклама"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Inter',sans-serif",
                border:"none",background:tab===t.id?"#0f172a":"#f1f5f9",color:tab===t.id?"#fff":"#64748b",transition:"all 0.2s",
              }}>{t.l}</button>
            ))}
          </div>

          {/* ===== PRODUCTS ===== */}
          {tab==="products"&&(
            <div>
              <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,overflow:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr><Th sticky bg="#fff"></Th>
                      {months.map(m=>{const mc=mColors[m];return(
                        <th key={m} colSpan={5} style={{textAlign:"center",padding:"10px 0 6px",borderBottom:`3px solid ${mc}`,background:`${mc}08`}}>
                          <MonthBadge label={pData[m].label} color={mc}/></th>
                      )})}
                    </tr>
                    <tr style={{borderBottom:"1px solid #e2e8f0"}}>
                      <Th sticky bg="#fff">Категорія</Th>
                      {months.map((m,mi)=>{const bg=mColors[m]+"06";const isLast=mi===months.length-1;return<>
                        <Th key={m+"o"} align="right" bg={bg}>Зам</Th>
                        <Th key={m+"q"} align="right" bg={bg}>Шт</Th>
                        <Th key={m+"r"} align="right" bg={bg}>Виручка</Th>
                        <Th key={m+"s"} align="right" bg={bg}>Витрати</Th>
                        <Th key={m+"d"} align="right" bg={bg}>ДРР</Th>
                      </>})}
                    </tr>
                  </thead>
                  <tbody>
                    {pData[months[0]].cats.map((c,i)=>(
                      <tr key={c.name} style={{borderBottom:"1px solid #f1f5f9"}}>
                        <STd><span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:c.color,marginRight:8}}/>{c.name}</STd>
                        {months.map((m,mi)=>{
                          const mc=pData[m].cats[i];const bg=mColors[m]+"06";
                          const isLast=mi<months.length-1;
                          const camp=pData[m].camps?pData[m].camps.find(cp=>{
                            if((c.name==="Содоструйки"||c.name==="Наконечники")&&cp.name==="Нак + Содо")return true;
                            return cp.name===c.name;
                          }):null;
                          let spend=0;
                          if(camp&&c.name!=="Наконечники")spend=Math.round(camp.spentUSD*USD);
                          const showSpend=c.name==="Наконечники"?null:spend;
                          const drr=showSpend&&mc.revenue>0?(showSpend/mc.revenue)*100:null;
                          return<>
                            <Td key={m+"o"} align="right" bg={bg}>{mc.orders||"—"}</Td>
                            <Td key={m+"q"} align="right" bg={bg}>{mc.qty||"—"}</Td>
                            <Td key={m+"r"} align="right" bold bg={bg}>{mc.revenue?`${fmt(mc.revenue)} ₴`:"—"}</Td>
                            <Td key={m+"s"} align="right" bg={bg} color="#64748b">{showSpend?`${fmt(showSpend)} ₴`:"*"}</Td>
                            <DrrCell key={m+"d"} val={drr} bg={bg} br={isLast}/>
                          </>;
                        })}
                      </tr>
                    ))}
                    <tr style={{borderTop:"2px solid #334155",background:"#f8fafc"}}>
                      <STd bg="#f8fafc"><strong>Всього</strong></STd>
                      {months.map((m,mi)=>{
                        const d=pData[m];const tSpend=monthAdSpend[m];
                        const tDrr=d.revenue>0?(tSpend/d.revenue)*100:0;
                        const isLast=mi<months.length-1;
                        return<>
                          <Td key={m+"o"} align="right" bold bg="#f8fafc">{d.orders}</Td>
                          <Td key={m+"q"} align="right" bold bg="#f8fafc">{d.cats.reduce((s,c)=>s+c.qty,0)}</Td>
                          <Td key={m+"r"} align="right" bold bg="#f8fafc">{fmt(d.revenue)} ₴</Td>
                          <Td key={m+"s"} align="right" bold bg="#f8fafc" color="#64748b">{fmt(tSpend)} ₴</Td>
                          <Td key={m+"d"} align="center" bold bg="#f8fafc" br={isLast}>{fmtPct(tDrr)}</Td>
                        </>;
                      })}
                    </tr>
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:6,fontSize:10,color:"#94a3b8"}}>* Спільна кампанія — витрати в рядку основної категорії</div>
              {/* Cancelled */}
              {months.some(m=>pData[m].cancelled.orders>0)&&(
                <div style={{marginTop:16,background:"#fef2f2",border:"1px solid #fecaca",borderRadius:12,padding:"14px 18px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#b91c1c",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:10}}>Анульовані замовлення</div>
                  <div style={{display:"flex",gap:12}}>
                    {months.map(m=>{const d=pData[m].cancelled;if(!d.orders)return null;return(
                      <div key={m} style={{flex:1,background:"#fff",border:"1px solid #fecaca",borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                        <div style={{fontSize:10,color:"#94a3b8",marginBottom:4}}>{pData[m].label}</div>
                        <div style={{fontSize:18,fontWeight:800,color:"#dc2626"}}>{d.orders} <span style={{fontSize:12,fontWeight:500}}>зам</span></div>
                        <div style={{fontSize:12,color:"#ef4444",marginTop:2}}>{fmt(d.revenue)} ₴</div>
                      </div>
                    )})}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ===== ADS ===== */}
          {tab==="ads"&&(
            <div>
              {/* PURCHASE CAMPAIGNS */}
              {hasCamps&&<>
                <SectionLabel icon="🛒">Кампанії на покупки</SectionLabel>
                <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,overflow:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr><Th sticky bg="#fff"></Th>
                        {months.map(m=>{const mc=mColors[m];return(
                          <th key={m} colSpan={5} style={{textAlign:"center",padding:"10px 0 6px",borderBottom:`3px solid ${mc}`,background:`${mc}08`}}>
                            <MonthBadge label={pData[m].label} color={mc}/></th>
                        )})}
                      </tr>
                      <tr style={{borderBottom:"1px solid #e2e8f0"}}>
                        <Th sticky bg="#fff">Кампанія</Th>
                        {months.map((m,mi)=>{const bg=mColors[m]+"06";return<>
                          <Th key={m+"s"} align="right" bg={bg}>Витрати</Th>
                          <Th key={m+"p"} align="center" bg={bg}>Покупки</Th>
                          <Th key={m+"rv"} align="right" bg={bg}>Виручка</Th>
                          <Th key={m+"ro"} align="center" bg={bg}>ROAS</Th>
                          <Th key={m+"d"} align="center" bg={bg}>ДРР</Th>
                        </>})}
                      </tr>
                    </thead>
                    <tbody>
                      {pData[months[0]].camps.map((c,i)=>(
                        <tr key={c.name} style={{borderBottom:"1px solid #f1f5f9"}}>
                          <STd>{c.name}</STd>
                          {months.map((m,mi)=>{
                            const mc=pData[m].camps[i];if(!mc)return Array(5).fill(null).map((_,j)=><Dash key={m+j}/>);
                            const sp=Math.round(mc.spentUSD*USD);const bg=mColors[m]+"06";
                            const isLast=mi<months.length-1;
                            if(!sp)return<><Dash bg={bg}/><Dash bg={bg}/><Dash bg={bg}/><Dash bg={bg}/><Dash bg={bg} br={isLast}/></>;
                            const roas=mc.rev>0?mc.rev/sp:0;const drr=mc.rev>0?(sp/mc.rev)*100:0;
                            return<>
                              <Td key={m+"s"} align="right" bold bg={bg}>{fmt(sp)} ₴</Td>
                              <Td key={m+"p"} align="center" bold bg={bg}>{mc.purchases}</Td>
                              <Td key={m+"rv"} align="right" bold bg={bg}>{fmt(mc.rev)} ₴</Td>
                              <RoasCell key={m+"ro"} val={roas}/>
                              <DrrCell key={m+"d"} val={drr} br={isLast}/>
                            </>;
                          })}
                        </tr>
                      ))}
                      <tr style={{borderTop:"2px solid #334155",background:"#f8fafc"}}>
                        <STd bg="#f8fafc"><strong>Всього</strong></STd>
                        {months.map((m,mi)=>{
                          const cs=pData[m].camps;if(!cs||!cs.length)return Array(5).fill(null).map((_,j)=><Dash key={m+j} bg="#f8fafc"/>);
                          const tSp=Math.round(cs.reduce((s,c)=>s+c.spentUSD,0)*USD);
                          const tPu=cs.reduce((s,c)=>s+c.purchases,0);
                          const tRv=cs.reduce((s,c)=>s+c.rev,0);
                          const roas=tRv>0&&tSp>0?tRv/tSp:0;const drr=tRv>0&&tSp>0?(tSp/tRv)*100:0;
                          const isLast=mi<months.length-1;
                          return<>
                            <Td key={m+"s"} align="right" bold bg="#f8fafc">{fmt(tSp)} ₴</Td>
                            <Td key={m+"p"} align="center" bold bg="#f8fafc">{tPu}</Td>
                            <Td key={m+"rv"} align="right" bold bg="#f8fafc">{fmt(tRv)} ₴</Td>
                            <RoasCell key={m+"ro"} val={roas}/>
                            <Td key={m+"d"} align="center" bold bg="#f8fafc" br={isLast}>{fmtPct(drr)}</Td>
                          </>;
                        })}
                      </tr>
                    </tbody>
                  </table>
                </div>
              </>}

              {/* LEADS */}
              {months.some(m=>pData[m].leads)&&<>
                <SectionLabel icon="📋">Кампанії на ліди</SectionLabel>
                <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,overflow:"hidden"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr style={{borderBottom:"1px solid #e2e8f0"}}>
                      <Th>Місяць</Th><Th align="right">Витрати</Th><Th align="right">Охоплення</Th><Th align="right">Кліки</Th><Th align="center">Ліди</Th><Th align="right">Ціна ліда</Th>
                    </tr></thead>
                    <tbody>
                      {months.map((m,i)=>{
                        const d=pData[m].leads;const mc=mColors[m];
                        if(!d)return <tr key={m} style={{borderBottom:"1px solid #f1f5f9"}}><Td><MonthBadge label={pData[m].label} color={mc}/></Td><Dash/><Dash/><Dash/><Dash/><Dash/></tr>;
                        const sp=Math.round(d.spentUSD*USD);const cpl=d.results>0?Math.round(sp/d.results):0;
                        return(
                          <tr key={m} style={{borderBottom:i<months.length-1?"1px solid #f1f5f9":"none"}}>
                            <Td><MonthBadge label={pData[m].label} color={mc}/></Td>
                            <Td align="right" bold>{fmt(sp)} ₴</Td>
                            <Td align="right">{fmt(d.reach)}</Td>
                            <Td align="right">{fmt(d.clicks)}</Td>
                            <Td align="center" bold>{d.results}</Td>
                            <Td align="right" bold color={cpl<1000?"#059669":"#d97706"}>{fmt(cpl)} ₴</Td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </>}

              {/* TRAFFIC */}
              {months.some(m=>pData[m].traffic)&&<>
                <SectionLabel icon="📈">Трафік Instagram</SectionLabel>
                <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,overflow:"hidden"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr style={{borderBottom:"1px solid #e2e8f0"}}>
                      <Th>Місяць</Th><Th align="right">Витрати</Th><Th align="right">Охоплення</Th><Th align="right">Кліки</Th><Th align="right">CPC</Th>
                    </tr></thead>
                    <tbody>
                      {months.map((m,i)=>{
                        const d=pData[m].traffic;const mc=mColors[m];
                        if(!d)return <tr key={m} style={{borderBottom:"1px solid #f1f5f9"}}><Td><MonthBadge label={pData[m].label} color={mc}/></Td><Dash/><Dash/><Dash/><Dash/></tr>;
                        const sp=Math.round(d.spentUSD*USD);const cpc=d.clicks>0?Math.round(sp/d.clicks):0;
                        return(
                          <tr key={m} style={{borderBottom:i<months.length-1?"1px solid #f1f5f9":"none"}}>
                            <Td><MonthBadge label={pData[m].label} color={mc}/></Td>
                            <Td align="right" bold>{fmt(sp)} ₴</Td>
                            <Td align="right">{fmt(d.reach)}</Td>
                            <Td align="right">{fmt(d.clicks)}</Td>
                            <Td align="right">{fmt(cpc)} ₴</Td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </>}
              <div style={{marginTop:10,fontSize:10,color:"#94a3b8"}}>* Витрати конвертовані за курсом {USD} ₴/$</div>
            </div>
          )}
        </>}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
